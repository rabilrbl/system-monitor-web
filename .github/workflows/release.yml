name: release-binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: system-monitor-web

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: startsWith(matrix.target, 'aarch64-unknown-linux-gnu') || startsWith(matrix.target, 'riscv64gc-unknown-linux-gnu')
        shell: bash
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            riscv64gc-unknown-linux-gnu)
              sudo apt-get install -y gcc-riscv64-linux-gnu
              ;;
          esac

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="${BINARY_NAME}-${{ matrix.target }}"
          mkdir -p "$pkg"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$pkg/"
          tar -czf "$pkg.tar.gz" "$pkg"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "${env:BINARY_NAME}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" "$pkg/"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.BINARY_NAME }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  publish:
    name: publish-versioned-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive release metadata from Cargo.toml
        id: meta
        shell: bash
        run: |
          cargo_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)

          if [ -z "$cargo_version" ]; then
            echo "Failed to parse package version from Cargo.toml"
            exit 1
          fi

          tag="v${cargo_version}"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=System Monitor Web - $tag" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          git fetch --tags origin

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            existing_sha=$(git rev-list -n 1 "$RELEASE_TAG")
            if [ "$existing_sha" != "$RELEASE_SHA" ]; then
              echo "Tag '$RELEASE_TAG' already exists on $existing_sha, not current commit $RELEASE_SHA."
              echo "Bump Cargo.toml version before merging to main."
              exit 1
            fi
            echo "Tag '$RELEASE_TAG' already exists on current commit; continuing."
          else
            git tag "$RELEASE_TAG" "$RELEASE_SHA"
            git push origin "$RELEASE_TAG"
          fi

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - name: Publish versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "dist/*"
          generateReleaseNotes: true
