name: Release binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: system-monitor-web

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - id: meta
        name: Compute release metadata
        shell: bash
        run: |
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          short_sha="${GITHUB_SHA::7}"
          tag="main-${timestamp}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Main build ${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            binary_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            binary_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Linux RISC-V linker
        if: matrix.target == 'riscv64gc-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          if [[ "${{ matrix.target }}" == "riscv64gc-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER=riscv64-linux-gnu-gcc
          fi
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.binary_ext }}" \
             "dist/${BINARY_NAME}-${{ matrix.target }}${{ matrix.binary_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/*
